# Loudrr Docker Compose - Production Ready for Coolify
# Usage: docker-compose up -d
version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: loudrr-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-loudrr}
      POSTGRES_USER: ${DB_USER:-loudrr}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No host port - internal service only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-loudrr}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: loudrr-redis
    restart: unless-stopped
    # No host port - internal service only
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Django Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loudrr-backend
    restart: unless-stopped
    ports:
      - "8080:8000"  # External 8080, internal 8000 (Coolify uses 8000)
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - DATABASE_URL=postgresql://${DB_USER:-loudrr}:${DB_PASSWORD}@db:5432/${DB_NAME:-loudrr}
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TWEETSCOUT_API_KEY=${TWEETSCOUT_API_KEY}
      - TWITTER_API_KEY=${TWITTER_API_KEY}
      - MINIAPP_URL=${MINIAPP_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: loudrr-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend

  # Telegram Bot (long-running process)
  bot:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loudrr-bot
    restart: unless-stopped
    command: python manage.py run_telegram_bot
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://${DB_USER:-loudrr}:${DB_PASSWORD}@db:5432/${DB_NAME:-loudrr}
      - REDIS_URL=redis://redis:6379/0
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TWEETSCOUT_API_KEY=${TWEETSCOUT_API_KEY}
      - TWITTER_API_KEY=${TWITTER_API_KEY}
      - MINIAPP_URL=${MINIAPP_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
