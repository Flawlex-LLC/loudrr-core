[mypy]
# Django-stubs configuration
# Note: Django plugin disabled due to initialization issues
# The stubs still provide type hints for IDE autocomplete
# plugins =
#     mypy_django_plugin.main,
#     mypy_drf_plugin.main

# Django settings module (for when plugin is enabled)
# [mypy.plugins.django-stubs]
# django_settings_module = "echo.settings"

# General settings
python_version = 3.10
strict = false
warn_return_any = true
warn_unused_ignores = true
show_error_codes = true
ignore_missing_imports = true

# Per-module settings
[mypy-*.migrations.*]
ignore_errors = true

[mypy-*.tests.*]
ignore_errors = true

[mypy-celery.*]
ignore_missing_imports = true

[mypy-redis.*]
ignore_missing_imports = true

[mypy-telegram.*]
ignore_missing_imports = true

[mypy-safedelete.*]
ignore_missing_imports = true

[mypy-django_fsm.*]
ignore_missing_imports = true

[mypy-rules.*]
ignore_missing_imports = true

[mypy-constance.*]
ignore_missing_imports = true

[mypy-waffle.*]
ignore_missing_imports = true

[mypy-structlog.*]
ignore_missing_imports = true

[mypy-pybreaker.*]
ignore_missing_imports = true

[mypy-auditlog.*]
ignore_missing_imports = true
