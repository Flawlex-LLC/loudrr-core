# Loudrr Backend Configuration
# =============================================================================

[tool.ruff]
target-version = "py310"
line-length = 100

# Exclude migrations and test files from strict linting
exclude = [
    "migrations",
    "__pycache__",
    ".git",
    ".venv",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "S",    # flake8-bandit (security)
    "SIM",  # flake8-simplify
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "S101",  # assert used (we use them intentionally in invariants)
    "S105",  # hardcoded password (false positives with env vars)
    "S106",  # hardcoded password (false positives)
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["S101", "S105", "S106"]  # Allow assert and test credentials
"**/migrations/**" = ["E501", "E402"]      # Migrations can be messy

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.bandit]
exclude_dirs = ["tests", "migrations", ".venv"]
skips = ["B101"]  # Skip assert warnings (we use them intentionally)

[tool.bandit.assert_used]
# Allow assert in these files
skips = ["*_test.py", "test_*.py"]
